services:
  # App Service (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: concordcrm-app:latest
    container_name: concord-app
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      APP_URL: ${APP_URL:-http://localhost}
    volumes:
      - .:/var/www/html
    networks:
      - concord-network

  # Web Service (Nginx)
  web:
    image: nginx:alpine
    container_name: concord-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./.docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - concord-network

  # Database Service (MySQL)
  db:
    image: mysql/mysql-server:8.0
    container_name: concord-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-concord}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-concord}
      MYSQL_PASSWORD: ${DB_PASSWORD:-concord}
    volumes:
      - concord-db-data:/var/lib/mysql
    networks:
      - concord-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-root}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache Service (Redis)
  redis:
    image: redis:alpine
    container_name: concord-redis
    restart: unless-stopped
    volumes:
      - concord-redis-data:/data
    networks:
      - concord-network

  # Automator (Migrations)
  automator:
    image: concordcrm-app:latest
    container_name: concord-automator
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
    networks:
      - concord-network
    entrypoint: [ "php", "artisan", "migrate", "--force" ]

networks:
  concord-network:
    driver: bridge

volumes:
  concord-db-data:
  concord-redis-data:
